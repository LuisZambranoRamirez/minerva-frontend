<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Sistema Minerva</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">

    <script>
        if (!localStorage.getItem('minerva_token')) {
            window.location.replace('login.html');
        }
    </script>
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/ventas.js" defer></script>
</head>
<body class="d-flex">

    <div id="menu-container"></div>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar"><i class="bi bi-list"></i></button>
                <span class="navbar-brand mb-0 h1">Módulo de Ventas</span>
            </div>
        </header>

        <main class="p-4 overflow-auto">
            <h2 class="mb-4">🛒 Punto de Venta</h2>

            <div class="row">
                <div class="col-md-7">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-transparent border-bottom-0 pt-4 pb-0">
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control" placeholder="Filtrar productos por nombre o código de barras..." id="buscar-prod">
                            </div>
                        </div>
                        <div class="card-body">
                            <h6 class="text-muted mb-3">Productos Disponibles</h6>
                            <div class="list-group" id="lista-busqueda" style="max-height: 500px; overflow-y: auto;">
                                </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-receipt"></i> Ticket de Venta</h5>
                            <button class="btn btn-sm btn-outline-light" onclick="vaciarCarrito()"><i class="bi bi-trash"></i> Vaciar</button>
                        </div>
                        <div class="card-body p-0">
                            <div class="p-3 bg-light border-bottom">
                                <label class="form-label small fw-bold text-muted mb-1">Tipo de Comprobante</label>
                                <select class="form-select form-select-sm" id="tipo-comprobante">
                                    <option value="BOLETA">Boleta Electrónica</option>
                                    <option value="FACTURA">Factura Electrónica</option>
                                </select>
                            </div>
                            <div style="min-height: 250px; max-height: 350px; overflow-y: auto;">
                                <table class="table mb-0 align-middle">
                                    <tbody id="carrito-body">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card-footer bg-light p-4">
                            <div class="d-flex justify-content-between text-muted mb-2">
                                <span>Subtotal (Gravado):</span>
                                <span id="subtotal-venta">$0.00</span>
                            </div>
                            <div class="d-flex justify-content-between text-muted mb-3">
                                <span>IGV (18%):</span>
                                <span id="igv-venta">$0.00</span>
                            </div>
                            <div class="d-flex justify-content-between fs-4 fw-bold text-primary border-top pt-2">
                                <span>Total:</span>
                                <span id="total-venta">$0.00</span>
                            </div>
                            <button class="btn btn-success btn-lg w-100 mt-4 fw-bold shadow-sm" onclick="procesarVenta()" id="btn-procesar">
                                <i class="bi bi-check-circle"></i> Emitir Boleta y Cobrar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="modalBoleta" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
                <div class="modal-dialog modal-dialog-centered modal-sm">
                    <div class="modal-content" style="border-radius: 0; font-family: 'Courier New', Courier, monospace;">
                        <div class="modal-body p-4 text-center" id="contenido-boleta">
                            </div>
                        <div class="modal-footer justify-content-between bg-light border-top-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="button" class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer"></i> Imprimir</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
