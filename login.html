<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Minerva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">
    
    <style>
        body.login-bg {
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: white;
        }
    </style>
</head>
<body class="login-bg">

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="bi bi-box-seam text-primary" style="font-size: 3.5rem;"></i>
            <h2 class="fw-bold mt-2">Minerva</h2>
            <p class="text-muted">Inicia sesión en tu cuenta</p>
        </div>
        
        <form id="form-login">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="ej. admin" required>
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="********" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Ingresar al Sistema</button>
            
            <div id="login-error" class="alert alert-danger mt-3 d-none small" role="alert">
                Usuario o contraseña incorrectos.
            </div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
