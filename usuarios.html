<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema Minerva</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">

    <script>
        if (!localStorage.getItem('minerva_token')) {
            window.location.replace('login.html');
        }
    </script>
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/usuarios.js" defer></script>
</head>
<body class="d-flex">

    <div id="menu-container"></div>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar"><i class="bi bi-list"></i></button>
                <span class="navbar-brand mb-0 h1">Módulo de Usuarios</span>
            </div>
        </header>

        <main class="p-4 overflow-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-person-badge"></i> Gestión de Usuarios</h2>
                <button class="btn btn-primary" onclick="abrirModalCrear()">
                    <i class="bi bi-plus-lg"></i> Nuevo Usuario
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre Completo</th>
                                    <th>Usuario</th>
                                    <th>Correo</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg"> <div class="modal-content">
                        <div class="modal-header bg-dark text-white">
                            <h5 class="modal-title" id="modalUsuarioTitle">Registrar Usuario</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="form-usuario">
                                <input type="hidden" id="user-id">
                                
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Nombre</label>
                                        <input type="text" class="form-control" id="user-firstname" placeholder="Ej. Juan" maxlength="60" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Apellido</label>
                                        <input type="text" class="form-control" id="user-lastname" placeholder="Ej. Pérez" maxlength="60" required>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label fw-bold">Correo Electrónico</label>
                                        <input type="email" class="form-control" id="user-email" placeholder="juan.perez@minerva.com" maxlength="100" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Nombre de Usuario</label>
                                        <input type="text" class="form-control" id="user-username" placeholder="Ej. jperez" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Contraseña</label>
                                        <input type="password" class="form-control" id="user-password" placeholder="********">
                                    </div>
                                    <div class="col-12 mt-0">
                                        <div class="form-text text-muted" id="password-help">Déjalo en blanco si no deseas cambiar la contraseña al editar.</div>
                                    </div>
                                    
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Rol en el Sistema</label>
                                        <select class="form-select" id="user-rol" required>
                                            <option value="OPERADOR">Operador</option>
                                            <option value="ADMIN">Administrador</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Estado</label>
                                        <select class="form-select" id="user-estado" required>
                                            <option value="Activo">Activo</option>
                                            <option value="Bloqueado">Bloqueado</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-success" onclick="guardarUsuario()">Guardar Datos</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
