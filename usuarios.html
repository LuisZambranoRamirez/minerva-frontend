<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema Minerva</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Estructura principal para evitar desbordamientos */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        /* Configuración base de la Barra Lateral */
        #sidebar {
            min-width: 280px;
            max-width: 280px;
            height: 100vh;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1040;
        }

        /* Esta clase se encarga de ESCONDER la barra desplazándola a la izquierda */
        #sidebar.collapsed {
            margin-left: -280px !important;
        }

        /* Contenedor derecho que envuelve el Header y la Tabla */
        .content-container {
            flex-grow: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        main {
            overflow-y: auto;
            height: calc(100vh - 73px);
        }

        /* Hover estético para los botones del menú */
        .nav-pills .nav-link:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff !important;
        }

        /* Adaptabilidad para pantallas de teléfonos celulares */
        @media (max-width: 768px) {
            #sidebar {
                margin-left: -280px;
                position: fixed;
            }
            #sidebar.collapsed {
                margin-left: 0 !important;
            }
        }
    </style>
    <script>
        if (!localStorage.getItem('minerva_token')) {
            window.location.replace('login.html');
        }
    </script>
</head>
<body class="d-flex bg-light">

    <nav id="sidebar" class="bg-dark text-white p-3 flex-shrink-0 d-flex flex-column">
        <a href="index.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-box-seam fs-4 me-2"></i>
            <span class="fs-5 fw-bold">Minerva</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="index.html" class="nav-link text-white">
                    <i class="bi bi-house-door me-2"></i> Inicio
                </a>
            </li>
            <li>
                <a href="productos.html" class="nav-link text-white">
                    <i class="bi bi-box me-2"></i> Productos
                </a>
            </li>
            <li>
                <a href="clientes.html" class="nav-link text-white">
                    <i class="bi bi-people me-2"></i> Clientes
                </a>
            </li>
            <li>
                <a href="ventas.html" class="nav-link text-white">
                    <i class="bi bi-cart-check me-2"></i> Ventas
                </a>
            </li>
            <li>
                <a href="usuarios.html" class="nav-link active" aria-current="page">
                    <i class="bi bi-person-badge me-2"></i> Usuarios
                </a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-5 me-2"></i>
                <strong>Admin</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser">
                <li><a class="dropdown-item" href="#">Configuración</a></li>
                <li><a class="dropdown-item" href="#">Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="content-container">
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 h1">Módulo de Usuarios</span>
            </div>
        </header>

        <main class="p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-person-badge"></i> Gestión de Usuarios</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUsuario" onclick="abrirModalCrear()">
                    <i class="bi bi-plus-lg"></i> Nuevo Usuario
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-dark text-white">
                            <h5 class="modal-title" id="modalUsuarioTitle">Registrar Usuario</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="form-usuario">
                                <input type="hidden" id="user-id">
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre de Usuario</label>
                                    <input type="text" class="form-control" id="username" placeholder="Ej. jperez" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Contraseña</label>
                                    <input type="password" class="form-control" id="password" placeholder="********">
                                    <div class="form-text" id="password-help">Déjalo en blanco si no deseas cambiar la contraseña al editar.</div>
                                </div>
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Rol en el Sistema</label>
                                        <select class="form-select" id="userRole" required>
                                            <option value="OPERADOR">Operador</option>
                                            <option value="ADMIN">Administrador</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Estado</label>
                                        <select class="form-select" id="userStatus" required>
                                            <option value="Activo">Activo</option>
                                            <option value="Bloqueado">Bloqueado</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-success" onclick="guardarUsuario()">Guardar Datos</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/usuarios.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toggleBtn = document.getElementById("toggleSidebar");
            const sidebar = document.getElementById("sidebar");

            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    // Intercambia la clase collapsed agregando un !important desde CSS
                    sidebar.classList.toggle("collapsed");
                });
            }
        });
    </script>
</body>
</html>
