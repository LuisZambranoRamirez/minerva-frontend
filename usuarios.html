<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Sistema Minerva</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">

    <script>
        if (!localStorage.getItem('minerva_token')) {
            window.location.replace('login.html');
        }
    </script>
</head>
<body class="d-flex">

    <div id="menu-container"></div>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar"><i class="bi bi-list"></i></button>
                <span class="navbar-brand mb-0 h1">Módulo de Clientes</span>
            </div>
        </header>

        <main class="p-4 overflow-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-people"></i> Gestión de Clientes</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCliente" onclick="prepararFormularioCrear()">
                    <i class="bi bi-plus-lg"></i> Nuevo Cliente
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre / ID de Cliente</th>
                                <th>Número de Teléfono</th>
                                <th>Fecha de Registro</th> <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-clientes">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="modal fade" id="modalCliente" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-dark text-white">
                            <h5 class="modal-title" id="modalClienteTitle">Registrar Cliente</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="form-cliente">
                                <input type="hidden" id="client-id-original">
                               
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre Completo / Razón Social</label>
                                    <input type="text" class="form-control" id="client-name" maxlength="100" placeholder="Ej. Pedro Sanchez" required>
                                    <div class="form-text">ID único del cliente en la base de datos.</div>
                                </div>
                               
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Número de Teléfono</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="text" class="form-control" id="client-phone" pattern="[0-9]{9}" maxlength="9" placeholder="Ej. 987654321" required>
                                    </div>
                                    <div class="form-text"> Ingrese su número de telefono </div>
                                </div>

                                <input type="hidden" id="client-registration-date">
                            </form>
                        </div>
                        <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-success" onclick="guardarCliente()">Guardar Datos</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
