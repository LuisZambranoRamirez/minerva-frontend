<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Sistema Minerva</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">

    <script>
        if (!localStorage.getItem('minerva_token')) {
            window.location.replace('login.html');
        }
    </script>

    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/productos.js" defer></script>
</head>
<body class="d-flex">

    <div id="menu-container"></div>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 h1">Módulo de Productos</span>
            </div>
        </header>

        <main class="p-4 overflow-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📦 Gestión de Productos</h2>
                <button class="btn btn-primary" onclick="abrirModalCrearProducto()">
                    <i class="bi bi-plus-lg"></i> Nuevo Producto
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Código / ID</th>
                                    <th>Nombre</th>
                                    <th>Código Barras</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Categoría</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-productos">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Registrar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form id="form-producto">
                                <input type="hidden" id="prod-id">
                                
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <label class="form-label fw-semibold">Nombre del Producto</label>
                                        <input type="text" class="form-control" id="prod-nombre" maxlength="100" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Código de Barras</label>
                                        <input type="text" class="form-control" id="prod-barcode" maxlength="13" placeholder="13 dígitos" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Estrategia de Ganancia</label>
                                        <select class="form-select" id="prod-gainStrategy" required>
                                            <option value="">Seleccione...</option>
                                            <option value="Porcentaje">Porcentaje (%)</option>
                                            <option value="Fijo">Monto Fijo ($)</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Valor de Ganancia</label>
                                        <input type="number" step="0.01" class="form-control" id="prod-gainAmount" required>
                                    </div>

                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Precio de Venta</label>
                                        <input type="number" step="0.01" class="form-control" id="prod-precio" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Stock Inicial</label>
                                        <input type="number" step="0.001" class="form-control" id="prod-stock" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Nivel de Reorden</label>
                                        <input type="number" step="0.001" class="form-control" id="prod-reorderLevel" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Tipo de Venta</label>
                                        <select class="form-select" id="prod-saleType" required>
                                            <option value="">Seleccione...</option>
                                            <option value="Unidad">Por Unidad</option>
                                            <option value="Mayor">Al por Mayor</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Categoría</label>
                                        <select class="form-select" id="prod-category" required>
                                            <option value="">Seleccione...</option>
                                            <option value="Electrónica">Electrónica</option>
                                            <option value="Accesorios">Accesorios</option>
                                            <option value="Otros">Otros</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-success" onclick="guardarProducto()">Guardar</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
