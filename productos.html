<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Sistema de Inventario</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex">

    <nav id="sidebar" class="bg-dark text-white p-3 flex-shrink-0">
        <a href="index.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-box-seam fs-4 me-2"></i>
            <span class="fs-5 fw-bold">Minerva</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door me-2"></i> Inicio
                </a>
            </li>
            <li>
                <a href="productos.html" class="nav-link active" aria-current="page">
                    <i class="bi bi-box me-2"></i> Productos
                </a>
            </li>
            <li>
                <a href="ventas.html" class="nav-link">
                    <i class="bi bi-cart-check me-2"></i> Ventas
                </a>
            </li>
            <li>
                <a href="contactos.html" class="nav-link">
                    <i class="bi bi-people me-2"></i> Contactos
                </a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-5 me-2"></i>
                <strong>Admin</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser">
                <li><a class="dropdown-item" href="#">Configuración</a></li>
                <li><a class="dropdown-item" href="#">Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        
        <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary me-3" id="toggleSidebar">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 h1">Módulo de Productos</span>
            </div>
        </header>

        <main class="p-4 overflow-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📦 Gestión de Productos</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProducto">
                    <i class="bi bi-plus-lg"></i> Nuevo Producto
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Registrar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="form-producto">
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Código de Barras</label>
                                        <input type="text" class="form-control" id="prod-barcode" maxlength="13" placeholder="13 dígitos" required>
                                    </div>
                                    <div class="col-md-8">
                                        <label class="form-label">Nombre del Producto</label>
                                        <input type="text" class="form-control" id="prod-nombre" maxlength="100" required>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Precio</label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input type="number" step="0.01" class="form-control" id="prod-precio" required>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Stock Inicial</label>
                                        <input type="number" step="0.001" class="form-control" id="prod-stock" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Límite de Alerta (Reorder)</label>
                                        <input type="number" step="0.001" class="form-control" id="prod-reorder" placeholder="Mínimo" required>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Estrategia de Ganancia</label>
                                        <select class="form-select" id="prod-gain-strategy" required>
                                            <option value="" selected disabled>Seleccione...</option>
                                            <option value="PORCENTAJE">Porcentaje (%)</option>
                                            <option value="FIJO">Monto Fijo</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Monto/Valor de Ganancia</label>
                                        <input type="number" step="0.01" class="form-control" id="prod-gain-amount" required>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Categoría</label>
                                        <select class="form-select" id="prod-category" required>
                                            <option value="" selected disabled>Seleccione...</option>
                                            <option value="ABARROTES">Abarrotes</option>
                                            <option value="BEBIDAS">Bebidas</option>
                                            <option value="LIMPIEZA">Limpieza</option>
                                            </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Tipo de Venta (SaleType)</label>
                                        <select class="form-select" id="prod-saletype" required>
                                            <option value="" selected disabled>Seleccione...</option>
                                            <option value="UNIDAD">Por Unidad</option>
                                            <option value="MAYORISTA">Al por Mayor</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" form="form-producto" class="btn btn-success" onclick="guardarProducto()">Guardar Producto</button>
                        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/productos.js"></script> </body>
</html>
